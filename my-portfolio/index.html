<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 网站标题（浏览器标签显示） -->
  <title>Xiaofan Mi | Portfolio</title>

  <!-- 网站描述（SEO + 分享摘要） -->
  <meta name="description" content="UX 设计师作品集，融合心理学与人机交互，专注于创造兼具美感与心理直觉的数字体验。">

  <!-- 关键词（SEO 可选） -->
  <meta name="keywords" content="UX设计, 用户研究, 人机交互, Portfolio, 心理学, HCI">

  <!-- Open Graph (社交平台分享卡片用) -->
  <meta property="og:title" content="Xiaofan Mi | Portfolio" />
  <meta property="og:description" content="融合心理学与人机交互的设计作品集" />
  <meta property="og:type" content="website" />
  <!-- 如果有封面图，放这里（推荐 1200x630 像素的 jpg/png） -->
  <meta property="og:image" content="https://yourdomain.com/cover.jpg" />
  <meta property="og:url" content="https://yourdomain.com" />

  <!-- Twitter 分享卡片 -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Xiaofan Mi | Portfolio" />
  <meta name="twitter:description" content="UX 设计师作品集，融合心理学与人机交互。" />
  <meta name="twitter:image" content="https://yourdomain.com/cover.jpg" />

  <!-- 网站图标 -->
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />

  <!-- 字体：可变 Inter，支持 TextPressure 动效 + Bitcount -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
</head>

<body>
  <!-- React 渲染入口 -->
  <div id="root"></div>

  <!-- Vite 自动加载 React -->
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
